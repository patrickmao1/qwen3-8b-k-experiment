# ============================================================================
# Continued-Pretraining (CPT) config for teaching Qwen3 base models K Framework.
# Everything downstream (split, replay, pack, train) reads this one file so the
# pipeline scales to bigger Qwen3 models and accepts new .k shards by edits here.
# ============================================================================

model:
  # Base (NOT instruct) model. Swap to unsloth/Qwen3-14B-Base etc. to scale up.
  name: "unsloth/Qwen3-8B-Base"
  max_seq_length: 2048          # 2048 fits 8B-4bit in 16GB; raise on bigger GPUs
  load_in_4bit: true            # QLoRA — required to fit 8B in 16GB VRAM
  dtype: null                   # null => auto (bf16 on Blackwell)

# ---- Data sources -----------------------------------------------------------
data:
  final_manifest: "data/final_manifest.jsonl"   # cleaned, current-K corpus
  corpus_root: "data/corpus_final"
  # Drop-in slot for the externally-generated big-language semantics. Point this
  # at a dir of *.k (or a manifest) and they get tokenized + mixed as K data.
  extra_k_shards: []            # e.g. ["data/synthetic/go", "data/synthetic/rust"]
  out_dir: "data/packed"        # packed token sequences land here

# ---- Train/val/test split (on the K corpus) --------------------------------
split:
  train: 0.80
  val: 0.10
  test: 0.10
  seed: 1234
  by: "file"                    # file-level random split (near-dups already removed)
  decontaminate: true           # n-gram overlap scrub of val/test against train

# ---- Mixture (CPT batch composition) ---------------------------------------
# 70% K (target) / 30% replay (preserve base ability). Replay is itself split
# 70% general code / 20% reasoning+math / 10% general text.
mixture:
  k_fraction: 0.70
  replay_fraction: 0.30
  replay:
    code: 0.70
    reasoning_math: 0.20
    general_text: 0.10
  # Weighted sampling realizes per-doc weights from the manifest (X86 down-weighted,
  # prose .md at 0.5, etc.) so no single source dominates the K portion.
  use_doc_weights: true

# ---- Replay dataset sources (streamed, only a small token budget pulled) -----
# Replay tokens needed ~= replay_fraction/k_fraction * K_tokens (small: ~1-2M).
replay_sources:
  code:
    # Multi-language code. Gated: needs HF_TOKEN + accepting terms at
    # https://huggingface.co/datasets/bigcode/the-stack-smol  (both done).
    # Ungated fallback: "christopher/rosetta-code" (text_field "code").
    dataset: "bigcode/the-stack-smol"
    split: "train"
    text_field: "content"
    # round-robin across language subdirs (the dataset is grouped by language)
    interleave_dirs: ["data/python","data/java","data/javascript","data/typescript",
      "data/c","data/c++","data/c-sharp","data/go","data/rust","data/ruby","data/php",
      "data/scala","data/haskell","data/lua","data/shell","data/sql"]
  reasoning_math:
    dataset: "open-r1/OpenR1-Math-220k"    # reasoning traces + math
    split: "train"
    text_field: "problem"                  # see build_replay.py for trace assembly
  general_text:
    dataset: "HuggingFaceFW/fineweb-edu"   # high-quality general web text
    subset: "sample-10BT"
    split: "train"
    text_field: "text"

# ---- LoRA / QLoRA -----------------------------------------------------------
lora:
  r: 32
  alpha: 32
  dropout: 0.0
  target_modules: ["q_proj","k_proj","v_proj","o_proj","gate_proj","up_proj","down_proj"]
  # K introduces NO new vocab (it's ASCII over existing tokens), so training the
  # embeddings is OPTIONAL and memory-heavy. Off by default for 16GB safety;
  # turn on (with a lower embedding_lr) if VRAM allows or on bigger GPUs.
  train_embeddings: false
  use_gradient_checkpointing: "unsloth"

# ---- Training hyperparameters ----------------------------------------------
train:
  output_dir: "outputs/cpt-qwen3-8b"
  epochs: 3                      # small corpus => few epochs; early-stop on val ppl
  per_device_batch_size: 2
  grad_accum: 8                  # effective batch = 16 sequences
  learning_rate: 3.0e-5
  embedding_learning_rate: 3.0e-6   # only used if lora.train_embeddings = true
  lr_scheduler: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.01
  max_grad_norm: 1.0
  logging_steps: 5
  eval_steps: 50                 # eval on val split (perplexity) for early stopping
  save_steps: 100
  early_stopping_patience: 3     # stop if val ppl doesn't improve N evals
  seed: 1234
  packing: true                  # pack documents into full max_seq_length sequences
  # Experiment tracking. "tensorboard" logs to <output_dir>/runs/ (view with
  # `uv run tensorboard --logdir outputs/cpt-qwen3-8b/runs`). Switch to "wandb",
  # or a list ["tensorboard","wandb"], or "none" to disable.
  report_to: "tensorboard"
